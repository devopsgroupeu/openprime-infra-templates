# GitHub Actions Pipeline for Terraform Deployment
#
# Pipeline Structure:
# 1. FORMAT stage   - Format Terraform code
# 2. VALIDATE stage - Validate Terraform configuration
# 3. PLAN stage     - Generate Terraform plan
# 4. APPLY stage    - Deploy infrastructure (manual trigger required)
# 5. DESTROY stage  - Destroy infrastructure (manual only)

name: Terraform Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  # @param terraform.version
  TF_VERSION: "1.11"
  TF_IN_AUTOMATION: "true"

jobs:
  # ========================================================================
  # FORMAT JOB
  # ========================================================================

  format-aws:
    name: "format:aws"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./terraform/aws

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

  format-k8s:
    name: "format:k8s"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

  # ========================================================================
  # VALIDATE JOB
  # ========================================================================

  validate-aws:
    name: "validate:aws"
    runs-on: ubuntu-latest
    needs: [format-aws]

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact --no-color

  # ========================================================================
  # PLAN JOB
  # ========================================================================

  plan-aws:
    name: "plan:aws"
    runs-on: ubuntu-latest
    needs: [validate-aws]

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-aws
          path: ./terraform/aws/tfplan
          retention-days: 7

  # ========================================================================
  # APPLY JOB - Protected by GitHub Environment approval
  # Configure "production" GitHub Environment with required reviewers.
  # On push to main: runs after plan, waits for Environment approval.
  # On workflow_dispatch with "apply": runs after plan, waits for approval.
  # Skipped on pull_request events.
  # ========================================================================

  apply-aws:
    name: "apply:aws"
    runs-on: ubuntu-latest
    needs: [plan-aws]
    if: github.event_name != 'pull_request'
    environment: production

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-aws
          path: ./terraform/aws

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Commit generated ArgoCD config files
        continue-on-error: true
        run: |
          git config user.email "ci-bot@openprime.io"
          git config user.name "OpenPrime CI"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add argocd/values/ argocd/support-resources/ || true
          if git diff --cached --quiet; then
            echo "No generated ArgoCD files changed."
          else
            git commit -m "ci: regenerate ArgoCD configs from Terraform outputs [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
        working-directory: ${{ github.workspace }}

  # ========================================================================
  # DESTROY JOB - Manual only, independent of apply
  # ========================================================================

  destroy-aws:
    name: "destroy:aws"
    runs-on: ubuntu-latest
    needs: [destroy-k8s]
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'
    environment: production

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

  # ========================================================================
  # VALIDATE KUBERNETES JOB
  # ========================================================================

  validate-k8s:
    name: "validate:k8s"
    runs-on: ubuntu-latest
    needs: [format-k8s]

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact --no-color

  # ========================================================================
  # PLAN KUBERNETES JOB
  # ========================================================================

  plan-k8s:
    name: "plan:k8s"
    runs-on: ubuntu-latest
    needs: [validate-k8s, apply-aws]

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-k8s
          path: ./terraform/kubernetes/tfplan
          retention-days: 7

  # ========================================================================
  # APPLY KUBERNETES JOB - Protected by GitHub Environment approval
  # Runs after AWS apply completes. Waits for Environment approval.
  # ========================================================================

  apply-k8s:
    name: "apply:k8s"
    runs-on: ubuntu-latest
    needs: [plan-k8s, apply-aws]
    if: github.event_name != 'pull_request'
    environment: production

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-k8s
          path: ./terraform/kubernetes

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ========================================================================
  # DESTROY KUBERNETES JOB - Manual only, independent of apply
  # ========================================================================

  destroy-k8s:
    name: "destroy:k8s"
    runs-on: ubuntu-latest
    needs: [apply-k8s]
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'
    environment: production

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
