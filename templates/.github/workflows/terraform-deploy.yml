---
# GitLab CI/CD Pipeline for Terraform Deployment
#
# Pipeline Structure:
# 1. FORMAT stage   - Auto-format Terraform code
# 2. VALIDATE stage - Validate Terraform configuration
# 3. PLAN stage     - Generate Terraform plan
# 4. APPLY stage    - Deploy infrastructure (manual approval required)
# 5. DESTROY stage  - Destroy infrastructure (manual only)

name: Terraform Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  # @param terraform.version
  TF_VERSION: '1.11'
  # @param aws.region
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-1' }}
  TF_IN_AUTOMATION: 'true'

jobs:
  # ========================================================================
  # FORMAT JOB
  # ========================================================================

  format-aws:
    name: 'format:aws'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -recursive

  # ========================================================================
  # VALIDATE JOB
  # ========================================================================

  validate-aws:
    name: 'validate:aws'
    runs-on: ubuntu-latest
    needs: [format-aws]

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          rm -f .terraform/terraform.tfstate
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_BUCKET_REGION || env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate -no-color

  # ========================================================================
  # PLAN JOB
  # ========================================================================

  plan-aws:
    name: 'plan:aws'
    runs-on: ubuntu-latest
    needs: [validate-aws]

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        id: init
        run: |
          rm -f .terraform/terraform.tfstate
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_BUCKET_REGION || env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -out=tfplan \
            -var="region=${{ env.AWS_REGION }}"
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-aws
          path: ./terraform/aws/tfplan
          retention-days: 7

  # ========================================================================
  # APPLY JOB - Requires manual approval via GitHub Environment protection
  # ========================================================================

  apply-aws:
    name: 'apply:aws'
    runs-on: ubuntu-latest
    needs: [plan-aws]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply'

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          rm -f .terraform/terraform.tfstate
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_BUCKET_REGION || env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-aws
          path: ./terraform/aws

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ========================================================================
  # DESTROY JOB - Manual only
  # ========================================================================

  destroy-aws:
    name: 'destroy:aws'
    runs-on: ubuntu-latest
    needs: [apply-aws]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.terraform_action == 'destroy' &&
      (needs.apply-aws.result == 'success' || needs.apply-aws.result == 'skipped')

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          rm -f .terraform/terraform.tfstate
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_BUCKET_REGION || env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var="region=${{ env.AWS_REGION }}"
