# GitHub Actions Pipeline for Terraform Deployment
#
# Pipeline Structure:
# 1. FORMAT stage   - Format Terraform code for AWS and Kubernetes
# 2. VALIDATE stage - Validate Terraform configuration (with TFLint)
# 3. PLAN stage     - Generate Terraform plan for AWS and Kubernetes
# 4. APPLY stage    - Deploy infrastructure (manual approval required via GitHub issue)
# 5. DESTROY stage  - Destroy infrastructure (manual workflow_dispatch only, destroys K8s then AWS)

name: Terraform Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  # @param terraform.version
  TF_VERSION: "1.11"
  TF_IN_AUTOMATION: "true"
  TF_VAR_git_repo_ssh_key: ${{ secrets.TF_VAR_GIT_REPO_SSH_KEY }}

jobs:
  # ========================================================================
  # FORMAT JOB
  # ========================================================================

  format-aws:
    name: "format:aws"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./terraform/aws

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

  format-k8s:
    name: "format:k8s"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

  # ========================================================================
  # VALIDATE JOB
  # ========================================================================

  validate-aws:
    name: "validate:aws"
    runs-on: ubuntu-latest
    needs: [format-aws]

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact --no-color

  # ========================================================================
  # PLAN JOB
  # ========================================================================

  plan-aws:
    name: "plan:aws"
    runs-on: ubuntu-latest
    needs: [validate-aws]

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-aws
          path: ./terraform/aws/tfplan
          retention-days: 7

  # ========================================================================
  # APPLY JOB - Protected by manual approval via GitHub issue
  # Requires approval from one of: andrej-rabek, avirostek, Sbekes.
  # On push to main: runs after plan, waits for manual approval.
  # On workflow_dispatch with "apply": runs after plan, waits for approval.
  # Skipped on pull_request events.
  # Commits generated ArgoCD config files back to repo after apply.
  # ========================================================================

  apply-aws:
    name: "apply:aws"
    runs-on: ubuntu-latest
    needs: [plan-aws]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply')

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      issues: write
      contents: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Download Terraform Plan
        uses: actions/download-artifact@v7
        with:
          name: tfplan-aws
          path: ./terraform/aws

      - name: Manual Workflow Approval
        uses: trstringer/manual-approval@v1.12.0
        with:
          secret: ${{ github.TOKEN }}
          approvers: andrej-rabek,avirostek,Sbekes
          minimum-approvals: 1
          issue-title: "Deploying infrastructure using terrafrom apply"
          issue-body: "Please approve or deny the deployment"
          fail-on-denial: true
          polling-interval-seconds: 15

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        run: terraform output -json > tf-outputs-aws.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v7
        with:
          name: tf-outputs-aws
          path: ./terraform/aws/tf-outputs-aws.json
          retention-days: 30
          archive: false

      - name: Commit generated ArgoCD config files
        continue-on-error: true
        run: |
          git config user.email "ci-bot@openprime.io"
          git config user.name "OpenPrime CI"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add argocd/values/ argocd/support-resources/ || true
          if git diff --cached --quiet; then
            echo "No generated ArgoCD files changed."
          else
            git commit -m "ci: regenerate ArgoCD configs from Terraform outputs [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
        working-directory: ${{ github.workspace }}

  # ========================================================================
  # DESTROY AWS JOB - Manual workflow_dispatch only
  # Runs after destroy-k8s completes (with if: always() to handle skipped K8s).
  # Destroys AWS infrastructure after Kubernetes resources are removed.
  # ========================================================================

  destroy-aws:
    name: "destroy:aws"
    runs-on: ubuntu-latest
    needs: [destroy-k8s]
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'

    defaults:
      run:
        working-directory: ./terraform/aws

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

  # ========================================================================
  # VALIDATE KUBERNETES JOB
  # ========================================================================

  validate-k8s:
    name: "validate:k8s"
    runs-on: ubuntu-latest
    needs: [format-k8s]

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact --no-color

  # ========================================================================
  # PLAN KUBERNETES JOB
  # ========================================================================

  plan-k8s:
    name: "plan:k8s"
    runs-on: ubuntu-latest
    needs: [validate-k8s, apply-aws]

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-k8s
          path: ./terraform/kubernetes/tfplan
          retention-days: 7

  # ========================================================================
  # APPLY KUBERNETES JOB - Protected by manual approval via GitHub issue
  # Runs after AWS apply completes. Waits for manual approval.
  # Requires approval from one of: andrej-rabek, avirostek, Sbekes.
  # ========================================================================

  apply-k8s:
    name: "apply:k8s"
    runs-on: ubuntu-latest
    needs: [plan-k8s, apply-aws]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply')

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read
      issues: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Download Terraform Plan
        uses: actions/download-artifact@v7
        with:
          name: tfplan-k8s
          path: ./terraform/kubernetes

      - name: Manual Workflow Approval
        uses: trstringer/manual-approval@v1.12.0
        with:
          secret: ${{ github.TOKEN }}
          approvers: andrej-rabek,avirostek,Sbekes
          minimum-approvals: 1
          issue-title: "Deploying infrastructure using terrafrom apply"
          issue-body: "Please approve or deny the deployment"
          fail-on-denial: true
          polling-interval-seconds: 15

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        run: terraform output -json > tf-outputs-k8s.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v7
        with:
          name: tf-outputs-k8s
          path: ./terraform/kubernetes/tf-outputs-k8s.json
          retention-days: 30
          archive: false

  # ========================================================================
  # DESTROY KUBERNETES JOB - Manual workflow_dispatch only
  # Depends on apply-k8s (runs with if: always() to handle skipped applies).
  # Destroys Kubernetes infrastructure first, then AWS infrastructure.
  # ========================================================================

  destroy-k8s:
    name: "destroy:k8s"
    runs-on: ubuntu-latest
    needs: [apply-k8s]
    if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'destroy'

    defaults:
      run:
        working-directory: ./terraform/kubernetes

    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
