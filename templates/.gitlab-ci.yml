# GitLab CI/CD Pipeline for Terraform Deployment
#
# Pipeline Structure:
#   AWS:  format → validate → plan → apply
#   K8s:  format → validate → plan (after AWS apply) → apply
#   Destroy: destroy:k8s → destroy:aws

variables:
  # @param terraform.version
  TF_VERSION: "1.11"
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  TF_IN_AUTOMATION: "true"
  # Backend configuration
  # @param backend.s3.bucket
  TF_STATE_BUCKET: ${TF_STATE_BUCKET}

# Cache Terraform plugins between jobs for faster execution
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - ${TF_ROOT}/aws/.terraform/providers
    - ${TF_ROOT}/aws/.terraform.lock.hcl
    - ${TF_ROOT}/kubernetes/.terraform/providers
    - ${TF_ROOT}/kubernetes/.terraform.lock.hcl

# Pipeline stages — separated per layer so K8s depends on AWS
stages:
  - format
  - validate
  - plan:aws
  - apply:aws
  - plan:k8s
  - apply:k8s
  - destroy

# ========================================================================
# SHARED TEMPLATES
# ========================================================================

# Base template for AWS Terraform jobs
.terraform_base:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  before_script:
    - cd ${TF_ROOT}/aws
    - terraform --version
    - terraform init -reconfigure

# Base template for Kubernetes Terraform jobs
.terraform_base_k8s:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  before_script:
    - cd ${TF_ROOT}/kubernetes
    - terraform --version
    - terraform init -reconfigure

# ========================================================================
# FORMAT STAGE - Format Terraform code
# ========================================================================

format:aws:
  stage: format
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - cd ${TF_ROOT}/aws
    - terraform fmt -check -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

format:k8s:
  stage: format
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - cd ${TF_ROOT}/kubernetes
    - terraform fmt -check -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ========================================================================
# VALIDATE STAGE - Validate Terraform configuration
# ========================================================================

validate:aws:
  stage: validate
  needs: [format:aws]
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  variables:
    TFLINT_VERSION: "0.61.0"
  script:
    - cd ${TF_ROOT}/aws
    - terraform --version
    - terraform init -backend=false
    - terraform validate
    - wget -qO /tmp/tflint.zip "https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip"
    - unzip -o /tmp/tflint.zip -d /usr/local/bin
    - tflint --init
    - tflint --format compact --no-color
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

validate:k8s:
  stage: validate
  needs: [format:k8s]
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  variables:
    TFLINT_VERSION: "0.61.0"
  script:
    - cd ${TF_ROOT}/kubernetes
    - terraform --version
    - terraform init -backend=false
    - terraform validate
    - wget -qO /tmp/tflint.zip "https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/tflint_linux_amd64.zip"
    - unzip -o /tmp/tflint.zip -d /usr/local/bin
    - tflint --init
    - tflint --format compact --no-color
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ========================================================================
# PLAN AWS STAGE
# ========================================================================

plan:aws:
  extends: .terraform_base
  stage: plan:aws
  needs: [validate:aws]
  script:
    - terraform plan -out=tfplan -no-color | tee plan.txt
    - terraform show -no-color tfplan > tfplan.txt
    - terraform show -json tfplan > tfplan.json
  artifacts:
    name: "terraform-plan-aws-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/aws/tfplan
      - ${TF_ROOT}/aws/tfplan.txt
      - ${TF_ROOT}/aws/tfplan.json
      - ${TF_ROOT}/aws/plan.txt
    expire_in: 7 days
    reports:
      terraform: ${TF_ROOT}/aws/tfplan.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ========================================================================
# APPLY AWS STAGE - Requires manual approval
# ========================================================================

apply:aws:
  extends: .terraform_base
  stage: apply:aws
  needs:
    - job: plan:aws
      artifacts: true
  environment:
    name: production
  script:
    - terraform apply -auto-approve tfplan
    - terraform output -json > outputs.json
    - |
      git config user.email "ci-bot@openprime.io"
      git config user.name "OpenPrime CI"
      cd ${CI_PROJECT_DIR}
      git add argocd/values/ argocd/support-resources/ || true
      if git diff --cached --quiet; then
        echo "No generated ArgoCD files changed."
      else
        git commit -m "ci: regenerate ArgoCD configs from Terraform outputs [skip ci]"
        # Requires CI_JOB_TOKEN write access: Settings → CI/CD → Token Access
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME} || echo "Warning: Failed to push ArgoCD configs"
      fi
  artifacts:
    name: "terraform-outputs-aws-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/aws/outputs.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# ========================================================================
# PLAN K8S STAGE - Runs after AWS apply
# ========================================================================

plan:k8s:
  extends: .terraform_base_k8s
  stage: plan:k8s
  needs:
    - job: validate:k8s
    - job: apply:aws
      optional: true
  script:
    - terraform plan -out=tfplan -no-color | tee plan.txt
    - terraform show -no-color tfplan > tfplan.txt
    - terraform show -json tfplan > tfplan.json
  artifacts:
    name: "terraform-plan-k8s-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/kubernetes/tfplan
      - ${TF_ROOT}/kubernetes/tfplan.txt
      - ${TF_ROOT}/kubernetes/tfplan.json
      - ${TF_ROOT}/kubernetes/plan.txt
    expire_in: 7 days
    reports:
      terraform: ${TF_ROOT}/kubernetes/tfplan.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# ========================================================================
# APPLY K8S STAGE - Requires manual approval, runs after AWS apply
# ========================================================================

apply:k8s:
  extends: .terraform_base_k8s
  stage: apply:k8s
  needs:
    - job: plan:k8s
      artifacts: true
    - job: apply:aws
      optional: true
  environment:
    name: production
  script:
    - terraform apply -auto-approve tfplan
    - terraform output -json > outputs.json
  artifacts:
    name: "terraform-outputs-k8s-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/kubernetes/outputs.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# ========================================================================
# DESTROY STAGE - Manual destruction only
# ========================================================================

destroy:k8s:
  extends: .terraform_base_k8s
  stage: destroy
  environment:
    name: production
  script:
    - terraform destroy -auto-approve
  dependencies: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

destroy:aws:
  extends: .terraform_base
  stage: destroy
  environment:
    name: production
  script:
    - terraform destroy -auto-approve
  dependencies: []
  needs:
    - job: destroy:k8s
      optional: true
      artifacts: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
