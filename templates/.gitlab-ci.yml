# GitLab CI/CD Pipeline for Terraform Deployment
#
# Pipeline Structure:
# 1. VALIDATE stage - Validate Terraform configuration
# 2. PLAN stage     - Generate Terraform plan
# 3. APPLY stage    - Deploy infrastructure (manual approval required)
# 4. DESTROY stage  - Destroy infrastructure (manual only)

variables:
  # @param terraform.version
  TF_VERSION: "1.11"
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  TF_IN_AUTOMATION: "true"
  # Backend configuration
  # @param backend.s3.bucket
  TF_STATE_BUCKET: ${TF_STATE_BUCKET}

# Cache Terraform plugins between jobs for faster execution
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - ${TF_ROOT}/aws/.terraform/providers
    - ${TF_ROOT}/aws/.terraform.lock.hcl
    - ${TF_ROOT}/kubernetes/.terraform/providers
    - ${TF_ROOT}/kubernetes/.terraform.lock.hcl

# Pipeline stages
stages:
  - format    # Format Terraform code
  - validate  # Validate Terraform configuration
  - plan      # Generate execution plan
  - apply     # Deploy infrastructure (manual approval required)
  - destroy   # Destroy infrastructure (manual only)

# ========================================================================
# SHARED TEMPLATES
# ========================================================================

# Base template for AWS Terraform jobs
.terraform_base:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  before_script:
    - cd ${TF_ROOT}/aws
    - terraform --version
    - terraform init -reconfigure

# Base template for Kubernetes Terraform jobs
.terraform_base_k8s:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  before_script:
    - cd ${TF_ROOT}/kubernetes
    - terraform --version
    - terraform init -reconfigure

# ========================================================================
# FORMAT STAGE - Format Terraform code
# ========================================================================

format:aws:
  stage: format
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - cd ${TF_ROOT}/aws
    - terraform fmt -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

format:k8s:
  stage: format
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - cd ${TF_ROOT}/kubernetes
    - terraform fmt -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ========================================================================
# VALIDATE STAGE - Validate Terraform configuration
# ========================================================================

validate:aws:
  stage: validate
  needs: [format:aws]
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - cd ${TF_ROOT}/aws
    - terraform --version
    - terraform init -backend=false
    - terraform validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

validate:k8s:
  stage: validate
  needs: [format:k8s]
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - cd ${TF_ROOT}/kubernetes
    - terraform --version
    - terraform init -backend=false
    - terraform validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ========================================================================
# PLAN STAGE - Generate execution plan
# ========================================================================

plan:aws:
  extends: .terraform_base
  stage: plan
  script:
    - terraform plan -out=tfplan -no-color | tee plan.txt
    - terraform show -no-color tfplan > tfplan.txt
    - terraform show -json tfplan > tfplan.json
  artifacts:
    name: "terraform-plan-aws-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/aws/tfplan
      - ${TF_ROOT}/aws/tfplan.txt
      - ${TF_ROOT}/aws/tfplan.json
      - ${TF_ROOT}/aws/plan.txt
    expire_in: 7 days
    reports:
      terraform: ${TF_ROOT}/aws/tfplan.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

plan:k8s:
  extends: .terraform_base_k8s
  stage: plan
  script:
    - terraform plan -out=tfplan -no-color | tee plan.txt
    - terraform show -no-color tfplan > tfplan.txt
    - terraform show -json tfplan > tfplan.json
  artifacts:
    name: "terraform-plan-k8s-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/kubernetes/tfplan
      - ${TF_ROOT}/kubernetes/tfplan.txt
      - ${TF_ROOT}/kubernetes/tfplan.json
      - ${TF_ROOT}/kubernetes/plan.txt
    expire_in: 7 days
    reports:
      terraform: ${TF_ROOT}/kubernetes/tfplan.json
  rules:
    - when: never

# ========================================================================
# APPLY STAGE - Requires manual approval via GitLab Environment protection
# ========================================================================

apply:aws:
  extends: .terraform_base
  stage: apply
  environment:
    name: production
  script:
    - terraform apply -auto-approve tfplan
    - terraform output -json > outputs.json
  dependencies:
    - plan:aws
  artifacts:
    name: "terraform-outputs-aws-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/aws/outputs.json
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

apply:k8s:
  extends: .terraform_base_k8s
  stage: apply
  environment:
    name: production
  script:
    - terraform apply -auto-approve tfplan
    - terraform output -json > outputs.json
  dependencies:
    - plan:k8s
  artifacts:
    name: "terraform-outputs-k8s-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${TF_ROOT}/kubernetes/outputs.json
    expire_in: 30 days
  rules:
    - when: never

# ========================================================================
# DESTROY STAGE - Manual destruction only
# ========================================================================

destroy:k8s:
  extends: .terraform_base_k8s
  stage: destroy
  environment:
    name: production
  script:
    - terraform destroy -auto-approve
  dependencies: []
  rules:
    - when: never

destroy:aws:
  extends: .terraform_base
  stage: destroy
  environment:
    name: production
  script:
    - terraform destroy -auto-approve
  dependencies: []
  needs:
    - job: destroy:k8s
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
